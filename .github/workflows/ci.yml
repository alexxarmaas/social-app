name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tramassso
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-only-secret-with-at-least-32-characters
